<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
  <h1>Login Page</h1>
  {% if messages %}
    {% for message in messages %}
      <p>{{ message }}</p>
    {% endfor %}
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <label>National ID:</label><input type="text" name="national_id"><br>
    <label>Password:</label><input type="password" name="password"><br>
    <button type="submit">Login</button>
  </form>
</body>
</html>
