<!DOCTYPE html>
<html>
<head><title>Profile</title></head>
<body>
  <h1>Profile</h1>
  <p>Name: {{ user.first_name }} {{ user.last_name }}</p>
  <p>National ID: {{ user.national_id }}</p>
  <p>Phone: {{ user.phone_number }}</p>
  {% if messages %}
    {% for message in messages %}
      <p>{{ message }}</p>
    {% endfor %}
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <label>First Name:</label><input type="text" name="first_name" value="{{ user.first_name }}"><br>
    <label>Last Name:</label><input type="text" name="last_name" value="{{ user.last_name }}"><br>
    <label>Phone Number:</label><input type="text" name="phone_number" value="{{ user.phone_number }}"><br>
    <label>Password:</label><input type="password" name="password"><br>
    <button type="submit">Update</button>
  </form>
  <a href="{% url 'users:dashboard' %}">Back to Dashboard</a>
</body>
</html>
