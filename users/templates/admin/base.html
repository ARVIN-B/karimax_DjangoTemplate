{% extends "admin/base.html" %}

{% block extrahead %}
    {{ block.super }}
    <style>
        #return-to-dashboard {
            margin-left: 10px;
        }
    </style>
{% endblock %}

{% block userlinks %}
    {{ block.super }}
    {% if user.is_authenticated and user.is_superuser %}
        <a href="{% url 'users:management_dashboard' %}" class="button" id="return-to-dashboard">
            <span>بازگشت به داشبورد مدیریت</span>
        </a>
    {% endif %}
{% endblock %}
