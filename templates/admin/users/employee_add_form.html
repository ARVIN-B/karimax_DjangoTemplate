{% extends "admin/change_form.html" %}
{% load i18n admin_urls static %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="{% static 'css/mobile-refactor.css' %}">
  <script src="{% static 'js/mobile-refactor.js' %}" defer></script>
{% endblock %}

{% block content %}
  <h1>{% trans 'اضافه کردن کارمند جدید' %}</h1>
  <form method="post" action="">
    {% csrf_token %}
    {{ adminform.form.as_p }}  <!-- تغییر از adminform.as_p به adminform.form.as_p -->
    <div class="submit-row">
      <input type="submit" value="{% trans 'ذخیره' %}" class="default" name="_save">
    </div>
  </form>
{% endblock %}
