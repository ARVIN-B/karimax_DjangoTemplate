<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">

    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->
    <link rel="stylesheet" href="https://unpkg.com/persian-datepicker@1.2.0/dist/css/persian-datepicker.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .wizard {
            max-width: 600px;
            margin: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h2 {
            text-align: center;
            color: #007bff;
            margin-bottom: 20px;
            font-size: 1.5em;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .form-group {
            position: relative;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .form-group:hover {
            transform: translateY(-2px);
        }
        .form-group i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 1.2em;
            z-index: 1;
        }
        input, select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            margin: 0;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
        }
        input:focus, select:focus {
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
            transform: scale(1.02);
            outline: none;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        button {
            width: 48%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
        }
        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 15px rgba(0, 123, 255, 0.3);
        }
        button.prev {
            background-color: #6c757d;
            color: white;
        }
        button.next, button.submit {
            background-color: #007bff;
            color: white;
        }
        button.prev:hover {
            background-color: #5a6268;
        }
        button.next:hover, button.submit:hover {
            background-color: #0056b3;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .wizard {
                padding: 15px;
                border-radius: 0;
            }
            button {
                width: 100%;
                margin-bottom: 10px;
            }
            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

    <script src="https://unpkg.com/persian-date@1.1.0/dist/persian-date.min.js"></script>
    <script src="https://unpkg.com/persian-datepicker@1.2.0/dist/js/persian-datepicker.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dateInputs = document.querySelectorAll('.pdp-default');
            dateInputs.forEach(input => {
                $(input).persianDatepicker({
                    format: 'YYYY/MM/DD',
                    toolbox: {
                        calendarSwitch: {
                            enabled: true
                        }
                    },
                    initialValue: false,
                    autoClose: true,
                    altField: input,
                    altFormat: 'YYYY/MM/DD'
                });
            });
        });

        function nextStep(step) {
            document.querySelector('.step.active').classList.remove('active');
            document.getElementById('step' + step).classList.add('active');
        }
        function prevStep(step) {
            document.querySelector('.step.active').classList.remove('active');
            document.getElementById('step' + step).classList.add('active');
        }
        document.getElementById('insuranceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            console.log(data); // برای حالا، لاگ به کنسول. در تولید، به سرور ارسال شود.
            alert('اطلاعات ارسال شد!');
        });
    </script>
